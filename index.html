<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 단톡방 분석 report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --border: #ffffff22;
  --text: #ffffff;
  --sub: #aaaaaa;
  --yellow: #ffe500;
}
.light {
  --bg: #f0f0f5;
  --card: #ffffff;
  --border: #00000015;
  --text: #111111;
  --sub: #555555;
  --yellow: #cc9900;
}
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; padding:20px; transition:all 0.3s; }
h1 { text-align:center; font-size:2em; margin:30px 0; color:var(--yellow); }
h2 { font-size:1.2em; margin:25px 0 12px; color:var(--yellow); border-left:4px solid var(--yellow); padding-left:10px; }
.toggle-btn { position:fixed; top:15px; right:15px; background:var(--card); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:20px; cursor:pointer; font-size:0.9em; z-index:999; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; margin-bottom:20px; }
.card { background:var(--card); border-radius:16px; padding:20px; border:1px solid var(--border); cursor:pointer; transition:transform 0.2s, box-shadow 0.2s; }
.card:hover { transform:translateY(-3px); box-shadow:0 8px 25px #00000044; }
.bar-row { display:flex; align-items:center; margin-bottom:8px; gap:8px; }
.bar-name { width:45px; font-weight:bold; font-size:0.85em; color:var(--yellow); }
.bar-bg { flex:1; background:#ffffff11; border-radius:8px; height:22px; overflow:hidden; }
.bar-fill { height:100%; border-radius:8px; display:flex; align-items:center; padding-left:6px; font-size:0.7em; font-weight:bold; transition:width 1.2s ease; }
.bar-val { font-size:0.8em; color:var(--sub); min-width:60px; text-align:right; }
.c0{background:linear-gradient(90deg,#ff6b6b,#ff8e53)}
.c1{background:linear-gradient(90deg,#4ecdc4,#44a8b3)}
.c2{background:linear-gradient(90deg,#a8edea,#fed6e3)}
.c3{background:linear-gradient(90deg,#f7971e,#ffd200)}
.c4{background:linear-gradient(90deg,#c471ed,#f64f59)}
.tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; position:sticky; top:0; background:var(--bg); padding:10px 0; z-index:100; }
.tab { padding:8px 16px; border-radius:20px; background:var(--card); cursor:pointer; font-size:0.85em; border:1px solid var(--border); color:var(--text); transition:all 0.2s; }
.tab:hover { border-color:var(--yellow); }
.tab.active { background:var(--yellow); color:#000; font-weight:bold; border-color:var(--yellow); }
.tab-content { display:none; }
.tab-content.active { display:block; }
.summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:25px; }
.summary-card { background:var(--card); border-radius:12px; padding:15px; text-align:center; border:1px solid var(--border); }
.summary-card .num { font-size:1.8em; font-weight:bold; color:var(--yellow); }
.summary-card .label { font-size:0.75em; color:var(--sub); margin-top:4px; }
.msg-item { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:0.88em; gap:10px; }
.msg-text { color:var(--text); flex:1; }
.msg-count { color:var(--yellow); font-weight:bold; white-space:nowrap; }
.topic-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:15px; }
.topic-card { background:var(--card); border-radius:12px; padding:15px; border:1px solid var(--border); }
.topic-title { font-size:1em; font-weight:bold; margin-bottom:10px; color:var(--yellow); }
.chart-wrap { background:var(--card); border-radius:16px; padding:20px; border:1px solid var(--border); margin-bottom:20px; }
.char-card { background:var(--card); border-radius:16px; padding:20px; border:2px solid var(--border); text-align:center; transition:all 0.3s; cursor:pointer; }
.char-card:hover { border-color:var(--yellow); transform:scale(1.03); }
.char-card .avatar { font-size:4em; margin-bottom:10px; }
.char-card .char-name { font-size:1.3em; font-weight:bold; color:var(--yellow); }
.char-card .char-title { font-size:0.8em; color:var(--sub); margin-bottom:15px; }
.stat-row { display:flex; justify-content:space-between; font-size:0.85em; padding:4px 0; border-bottom:1px solid var(--border); }
.stat-label { color:var(--sub); }
.stat-val { color:var(--text); font-weight:bold; }
.reaction-box { background:var(--card); border-radius:12px; padding:15px; border:1px solid var(--border); margin-bottom:12px; }
.reaction-title { font-size:0.9em; color:var(--sub); margin-bottom:8px; }
.reaction-arrow { font-size:1.1em; color:var(--text); }
.award-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
.award-label { color:var(--sub); font-size:0.9em; }
.award-winner { color:var(--yellow); font-weight:bold; font-size:1em; }
.emoji-bar { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
.emoji-btn { background:#ffffff11; border:1px solid var(--border); border-radius:20px; padding:5px 12px; cursor:pointer; font-size:0.9em; transition:all 0.2s; color:var(--text); }
.emoji-btn:hover { background:#ffffff22; transform:scale(1.1); }
.emoji-btn.reacted { background:var(--yellow); color:#000; border-color:var(--yellow); }
.modal { display:none; position:fixed; inset:0; background:#00000088; z-index:999; align-items:center; justify-content:center; }
.modal.open { display:flex; }
.modal-box { background:var(--card); border-radius:20px; padding:30px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; border:1px solid var(--border); }
.modal-close { float:right; background:none; border:none; color:var(--sub); font-size:1.5em; cursor:pointer; }
.progress-bar { background:#ffffff11; border-radius:10px; height:8px; margin:5px 0 10px; overflow:hidden; }
.progress-fill { height:100%; border-radius:10px; transition:width 1s ease; }
</style>
</head>

const COLORS = ['c0','c1','c2','c3','c4'];
const CHART_COLORS = ['#ff6b6b','#4ecdc4','#ffe500','#f7971e','#c471ed'];
const EMOJIS = ['😂','😮','🔥','💀','👑'];
const reactions = JSON.parse(localStorage.getItem('reactions') || '{}');

// 다크/라이트 토글
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function makeBar(name, val, maxVal, unit, idx) {
  const pct = maxVal > 0 ? Math.min((val/maxVal*100), 100) : 0;
  return `<div class="bar-row">
    <div class="bar-name">${name}</div>
    <div class="bar-bg"><div class="bar-fill ${COLORS[idx%COLORS.length]}" style="width:${pct}%"></div></div>
    <div class="bar-val">${val}${unit}</div>
  </div>`;
}

function makeCard(title, dataObj, unit, subObj, cardId) {
  const sorted = Object.entries(dataObj).sort((a,b)=>b[1]-a[1]);
  const maxVal = sorted[0]?.[1]||1;
  let html = `<div class="card"><h3 style="color:var(--sub);font-size:0.95em;margin-bottom:12px;">${title}</h3>`;
  sorted.forEach(([name,val],i) => {
    const sub = subObj ? ` (${subObj[name]}%)` : '';
    html += makeBar(name, val, maxVal, unit+sub, i);
  });
  if (cardId) html += makeEmojiBar(cardId);
  return html + '</div>';
}

function makeEmojiBar(id) {
  let html = '<div class="emoji-bar">';
  EMOJIS.forEach(e => {
    const key = id+'_'+e;
    const cnt = reactions[key]||0;
    const reacted = localStorage.getItem('reacted_'+key);
    html += `<button class="emoji-btn${reacted?' reacted':''}" onclick="reactEmoji('${id}','${e}',this)">${e} ${cnt}</button>`;
  });
  return html + '</div>';
}

function reactEmoji(id, emoji, btn) {
  const key = id+'_'+emoji;
  const reactedKey = 'reacted_'+key;
  if (localStorage.getItem(reactedKey)) {
    reactions[key] = Math.max((reactions[key]||1)-1, 0);
    localStorage.removeItem(reactedKey);
    btn.classList.remove('reacted');
  } else {
    reactions[key] = (reactions[key]||0)+1;
    localStorage.setItem(reactedKey, '1');
    btn.classList.add('reacted');
  }
  localStorage.setItem('reactions', JSON.stringify(reactions));
  btn.innerHTML = emoji+' '+reactions[key];
}

// 총 메시지
document.getElementById('totalMsg').textContent = DATA.total.toLocaleString();

// 요약
const summaryEl = document.getElementById('summary');
const totalKk = Object.values(DATA.kk_count).reduce((a,b)=>a+b,0);
const totalBad = Object.values(DATA.bad_count).reduce((a,b)=>a+b,0);
summaryEl.innerHTML = `
  <div class="summary-card"><div class="num">${DATA.total.toLocaleString()}</div><div class="label">총 메시지</div></div>
  <div class="summary-card"><div class="num">${DATA.names.length}</div><div class="label">참여자</div></div>
  <div class="summary-card"><div class="num">${totalKk.toLocaleString()}</div><div class="label">총 ㅋ 개수</div></div>
  <div class="summary-card"><div class="num">${totalBad}</div><div class="label">총 욕설</div></div>
  <div class="summary-card"><div class="num">${DATA.best_days[0]?.[0]||'-'}</div><div class="label">가장 핫했던 날</div></div>
`;

// 통계 탭
document.getElementById('stats').innerHTML = `<div class="grid">
  ${makeCard('📊 메시지 횟수', DATA.message_count, '회', DATA.message_pct, 'msg')}
  ${makeCard('😂 ㅋ 개수', DATA.kk_count, '개', DATA.kk_per_msg, 'kk')}
  ${makeCard('📏 평균 메시지 길이', DATA.avg_length, '자', null, 'len')}
  ${makeCard('🤬 욕설 횟수', DATA.bad_count, '회', DATA.bad_pct, 'bad')}
  ${makeCard('😊 긍정 메시지', DATA.positive_count, '회', DATA.positive_pct, 'pos')}
  ${makeCard('😞 부정 메시지', DATA.negative_count, '회', DATA.negative_pct, 'neg')}
  ${makeCard('😲 감탄사', DATA.exclaim_count, '회', null, 'exc')}
  ${makeCard('🔗 링크/사진', DATA.link_count, '회', DATA.link_pct, 'link')}
  ${makeCard('❓ 질문 횟수', DATA.question_count, '회', DATA.question_pct, 'q')}
  ${makeCard('📨 연속 도배 최고기록', DATA.max_consecutive, '연속', null, 'cons')}
  ${makeCard('🦉 야행성 지수', DATA.night_owl, '%', null, 'night')}
  ${makeCard('💬 대화 시작', DATA.convo_start, '회', DATA.convo_start_pct, 'start')}
  ${makeCard('🔚 대화 종료', DATA.convo_end, '회', null, 'end')}
  ${makeCard('😶 씹힌 횟수', DATA.ignored_count, '회', null, 'ign')}
  ${makeCard('🎉 분위기 메이커', DATA.mood_maker, '점', null, 'mood')}
  ${makeCard('💕 여미새 지수', DATA.girl_count, '회', DATA.girl_pct, 'girl')}
</div>`;

// 캐릭터 카드
const AVATARS = ['🗡️','🛡️','🧙','🏹','⚡'];
const TITLES = (name) => {
  const mc = DATA.message_count[name]||0;
  const bad = DATA.bad_pct[name]||0;
  const night = DATA.night_owl[name]||0;
  const girl = DATA.girl_pct[name]||0;
  if (bad > 5) return '🤬 욕쟁이';
  if (night > 40) return '🦉 야행성';
  if (girl > 3) return '💕 여미새';
  if (mc === Math.max(...Object.values(DATA.message_count))) return '👑 단톡방 왕';
  return '😐 일반인';
};

let charsHtml = '<div class="grid">';
DATA.names.forEach((name, i) => {
  charsHtml += `<div class="char-card" onclick="openCharModal('${name}')">
    <div class="avatar">${AVATARS[i%AVATARS.length]}</div>
    <div class="char-name">${name}</div>
    <div class="char-title">${TITLES(name)}</div>
    <div class="progress-bar"><div class="progress-fill ${COLORS[i%COLORS.length]}" style="width:${DATA.message_pct[name]||0}%"></div></div>
    <div style="font-size:0.75em;color:var(--sub)">메시지 점유율 ${DATA.message_pct[name]||0}%</div>
    <div style="margin-top:12px;">
      <div class="stat-row"><span class="stat-label">📨 메시지</span><span class="stat-val">${DATA.message_count[name]||0}회</span></div>
      <div class="stat-row"><span class="stat-label">😂 ㅋ개수</span><span class="stat-val">${DATA.kk_count[name]||0}개</span></div>
      <div class="stat-row"><span class="stat-label">🤬 욕설</span><span class="stat-val">${DATA.bad_count[name]||0}회</span></div>
      <div class="stat-row"><span class="stat-label">🦉 야행성</span><span class="stat-val">${DATA.night_owl[name]||0}%</span></div>
    </div>
  </div>`;
});
document.getElementById('chars').innerHTML = charsHtml + '</div>';

function openCharModal(name) {
  const i = DATA.names.indexOf(name);
  document.getElementById('modalContent').innerHTML = `
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:4em">${AVATARS[i%AVATARS.length]}</div>
      <div style="font-size:1.5em;font-weight:bold;color:var(--yellow)">${name}</div>
      <div style="color:var(--sub);font-size:0.9em">${TITLES(name)}</div>
    </div>
    <div class="stat-row"><span class="stat-label">📨 총 메시지</span><span class="stat-val">${DATA.message_count[name]||0}회 (${DATA.message_pct[name]||0}%)</span></div>
    <div class="stat-row"><span class="stat-label">😂 ㅋ 개수</span><span class="stat-val">${DATA.kk_count[name]||0}개</span></div>
    <div class="stat-row"><span class="stat-label">📏 평균 길이</span><span class="stat-val">${DATA.avg_length[name]||0}자</span></div>
    <div class="stat-row"><span class="stat-label">🤬 욕설</span><span class="stat-val">${DATA.bad_count[name]||0}회 (${DATA.bad_pct[name]||0}%)</span></div>
    <div class="stat-row"><span class="stat-label">😊 긍정</span><span class="stat-val">${DATA.positive_count[name]||0}회</span></div>
    <div class="stat-row"><span class="stat-label">😞 부정</span><span class="stat-val">${DATA.negative_count[name]||0}회</span></div>
    <div class="stat-row"><span class="stat-label">🦉 야행성</span><span class="stat-val">${DATA.night_owl[name]||0}%</span></div>
    <div class="stat-row"><span class="stat-label">💬 대화 시작</span><span class="stat-val">${DATA.convo_start[name]||0}회</span></div>
    <div class="stat-row"><span class="stat-label">🔚 대화 종료</span><span class="stat-val">${DATA.convo_end[name]||0}회</span></div>
    <div class="stat-row"><span class="stat-label">😶 씹힌 횟수</span><span class="stat-val">${DATA.ignored_count[name]||0}회</span></div>
    <div class="stat-row"><span class="stat-label">💕 여미새</span><span class="stat-val">${DATA.girl_pct[name]||0}%</span></div>
    <h3 style="margin:15px 0 8px;color:var(--yellow)">💬 명언 TOP 5</h3>
    ${(DATA.top_messages[name]||[]).slice(0,5).map(([msg,cnt])=>`
      <div class="msg-item"><span class="msg-text">${msg}</span><span class="msg-count">${cnt}회</span></div>
    `).join('')}
  `;
  document.getElementById('charModal').classList.add('open');
}

function closeModal() {
  document.getElementById('charModal').classList.remove('open');
}

// 명언 탭
let msgHtml = '<div class="grid">';
DATA.names.forEach(name => {
  const msgs = DATA.top_messages[name]||[];
  msgHtml += `<div class="card"><h3 style="color:var(--yellow);margin-bottom:12px;">💬 ${name}의 명언 TOP 10</h3>`;
  msgs.forEach(([msg,cnt],i) => {
    const medals=['🥇','🥈','🥉'];
    msgHtml += `<div class="msg-item"><span class="msg-text">${medals[i]||'　'} ${msg}</span><span class="msg-count">${cnt}회</span></div>`;
  });
  msgHtml += '</div>';
});
document.getElementById('messages').innerHTML = msgHtml + '</div>';

// 주제 탭
let topicHtml = '<div class="topic-grid">';
Object.entries(DATA.topic_count).forEach(([topic, counts]) => {
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const total = Object.values(counts).reduce((a,b)=>a+b,0);
  topicHtml += `<div class="topic-card"><div class="topic-title">${topic}</div>`;
  sorted.forEach(([name,cnt],i) => {
    const pct = Math.round(cnt/total*100);
    topicHtml += makeBar(name, cnt, sorted[0][1], `회 (${pct}%)`, i);
  });
  topicHtml += '</div>';
});
document.getElementById('topics').innerHTML = topicHtml + '</div>';

// 관계 탭
let relHtml = '<h2>🔗 반응 패턴 (A가 말하면 B가 가장 많이 반응)</h2><div class="grid">';
Object.entries(DATA.best_reaction).forEach(([from, info]) => {
  relHtml += `<div class="reaction-box">
    <div class="reaction-title">가장 많이 반응하는 관계</div>
    <div class="reaction-arrow">👤 <strong style="color:var(--yellow)">${from}</strong> → 💬 <strong style="color:#4ecdc4">${info.to}</strong> <span style="color:var(--sub)">(${info.count}회)</span></div>
  </div>`;
});
relHtml += '</div>';
relHtml += '<h2>💬 대화 시작 vs 종료</h2><div class="grid">';
relHtml += makeCard('🚀 대화 시작왕', DATA.convo_start, '회', DATA.convo_start_pct, 'rel_start');
relHtml += makeCard('🔚 대화 종료왕', DATA.convo_end, '회', null, 'rel_end');
relHtml += makeCard('😶 씹힘 당한 횟수', DATA.ignored_count, '회', null, 'rel_ign');
relHtml += makeCard('🎉 분위기 메이커', DATA.mood_maker, '점', null, 'rel_mood');
relHtml += '</div>';
document.getElementById('relations').innerHTML = relHtml;

// 차트 탭
document.getElementById('charts').innerHTML = `
  <div class="chart-wrap"><h2>🕐 시간대별 대화량</h2><canvas id="hourChart"></canvas></div>
  <div class="chart-wrap"><h2>📅 요일별 대화량</h2><canvas id="weekChart"></canvas></div>
  <div class="chart-wrap"><h2>🥧 메시지 비율</h2><canvas id="pieChart"></canvas></div>
`;

const hourLabels = Array.from({length:24},(_,i)=>`${i}시`);
new Chart(document.getElementById('hourChart'), {
  type:'line',
  data:{
    labels:hourLabels,
    datasets:DATA.names.map((name,i)=>({
      label:name,
      data:hourLabels.map((_,h)=>DATA.hour_count[name]?.[h]||0),
      borderColor:CHART_COLORS[i],
      backgroundColor:CHART_COLORS[i]+'33',
      fill:true, tension:0.4
    }))
  },
  options:{plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#aaa'},grid:{color:'#ffffff11'}},y:{ticks:{color:'#aaa'},grid:{color:'#ffffff11'}}}}
});

const weekLabels=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const weekNames=['월','화','수','목','금','토','일'];
new Chart(document.getElementById('weekChart'), {
  type:'bar',
  data:{
    labels:weekNames,
    datasets:DATA.names.map((name,i)=>({
      label:name,
      data:weekLabels.map(day=>DATA.weekday_count[name]?.[day]||0),
      backgroundColor:CHART_COLORS[i]+'bb',
      borderRadius:6
    }))
  },
  options:{plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#aaa'},grid:{color:'#ffffff11'}},y:{ticks:{color:'#aaa'},grid:{color:'#ffffff11'}}}}
});

new Chart(document.getElementById('pieChart'), {
  type:'doughnut',
  data:{
    labels:DATA.names,
    datasets:[{data:DATA.names.map(n=>DATA.message_count[n]||0),backgroundColor:CHART_COLORS,borderWidth:2}]
  },
  options:{plugins:{legend:{labels:{color:'#fff'}}}}
});

// 시상식 탭
const getTop = (obj) => Object.entries(obj).sort((a,b)=>b[1]-a[1])[0]?.[0]||'-';
const getBot = (obj) => Object.entries(obj).sort((a,b)=>a[1]-b[1])[0]?.[0]||'-';
const awards = [
  ['👑 말많은 사람', getTop(DATA.message_count)],
  ['😶 말없는 사람', getBot(DATA.message_count)],
  ['😂 ㅋ 장인', getTop(DATA.kk_count)],
  ['📝 장문 작가', getTop(DATA.avg_length)],
  ['🤬 욕쟁이', getTop(DATA.bad_count)],
  ['😊 긍정왕', getTop(DATA.positive_count)],
  ['😞 부정왕', getTop(DATA.negative_count)],
  ['🔗 링크봇', getTop(DATA.link_count)],
  ['❓ 질문왕', getTop(DATA.question_count)],
  ['📨 도배왕', getTop(DATA.max_consecutive)],
  ['🦉 야행성', getTop(DATA.night_owl)],
  ['🚀 대화 시작왕', getTop(DATA.convo_start)],
  ['🔚 대화 종료왕', getTop(DATA.convo_end)],
  ['😶 씹힘왕', getTop(DATA.ignored_count)],
  ['🎉 분위기 메이커', getTop(DATA.mood_maker)],
  ['💕 여미새', getTop(DATA.girl_count)],
];
document.getElementById('awards').innerHTML = `<div class="grid"><div class="card">
  <h3 style="color:var(--yellow);margin-bottom:15px;font-size:1.2em;">🏅 단톡방 시상식</h3>
  ${awards.map(([label,winner])=>`
    <div class="award-item">
      <span class="award-label">${label}</span>
      <span class="award-winner">${winner}</span>
    </div>`).join('')}
</div></div>`;
</script>
</body>
